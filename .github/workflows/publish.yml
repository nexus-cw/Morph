name: Publish to NuGet

on:
  # Manual trigger — from Actions tab in GitHub UI.
  workflow_dispatch:

  # Tag-driven publish — push a tag like v0.1.0-alpha to publish that version.
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for NuGet.org Trusted Publishing OIDC exchange
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for SourceLink commit capture

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: dotnet restore Morph.sln

      - name: Build
        run: dotnet build Morph.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/Morph.Tests/Morph.Tests.csproj -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/Morph/Morph.csproj -c Release --no-build -o out

      - name: List artifacts
        run: ls -la out/

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: nexus-cw

      - name: NuGet push
        run: |
          dotnet nuget push out/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
